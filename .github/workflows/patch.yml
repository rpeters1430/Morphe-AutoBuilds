name: Daily Patch Build and Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

concurrency:
  group: daily-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-matrix:
    name: Prepare Build Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      matrix_count: ${{ steps.matrix.outputs.matrix_count }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Matrix from Config
        id: matrix
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const patchConfig = JSON.parse(fs.readFileSync('./patch-config.json', 'utf8'));
            const archConfig = JSON.parse(fs.readFileSync('./arch-config.json', 'utf8'));

            const patchList = patchConfig.patch_list || [];
            const archMap = new Map();

            for (const item of archConfig) {
              const app = (item.app_name || '').trim().toLowerCase();
              const source = (item.source || '').trim().toLowerCase();
              const arches = (item.arches || []).filter(Boolean);
              if (!app || !source || arches.length === 0) continue;
              archMap.set(`${app}|${source}`, arches);
            }

            const include = [];

            for (const item of patchList) {
              const app = (item.app_name || '').trim().toLowerCase();
              const source = (item.source || '').trim().toLowerCase();
              if (!app || !source) continue;

              const arches = archMap.get(`${app}|${source}`) || ['universal'];
              for (const arch of arches) {
                include.push({ app_name: app, source, arch });
              }
            }

            if (include.length === 0) {
              core.setFailed('No build targets generated from patch-config.json and arch-config.json');
              return;
            }

            core.info(`Generated ${include.length} build targets`);
            core.setOutput('matrix', JSON.stringify({ include }));
            core.setOutput('matrix_count', String(include.length));

  build-apks:
    name: Build APK (${{ matrix.app_name }} / ${{ matrix.source }} / ${{ matrix.arch }})
    needs: prepare-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Build Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt requests beautifulsoup4
          sudo apt-get update
          sudo apt-get install -y zip apksigner

      - name: Build Target
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APP_NAME: ${{ matrix.app_name }}
          SOURCE: ${{ matrix.source }}
          ARCH: ${{ matrix.arch }}
        run: |
          echo "Building app=${{ matrix.app_name }} source=${{ matrix.source }} arch=${{ matrix.arch }}"
          python -m src "${{ matrix.app_name }}" --source "${{ matrix.source }}" --arch "${{ matrix.arch }}"

      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.app_name }}-${{ matrix.source }}-${{ matrix.arch }}
          path: "*.apk"
          if-no-files-found: warn

  publish-release:
    name: Publish Latest Release
    needs:
      - prepare-matrix
      - build-apks
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Built APKs
        uses: actions/download-artifact@v4
        with:
          path: ./all-apks
          if-no-files-found: warn

      - name: Prepare Release Files
        id: prepare
        run: |
          mkdir -p release-apks
          find ./all-apks -type f -name "*.apk" -exec cp {} ./release-apks/ \;

          apk_count=$(find ./release-apks -maxdepth 1 -type f -name "*.apk" | wc -l | tr -d ' ')
          echo "apk_count=$apk_count" >> "$GITHUB_OUTPUT"

          if [ "$apk_count" -eq 0 ]; then
            echo "No APK files found. Skipping release."
            echo "skip_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Release Notes
        if: steps.prepare.outputs.skip_release == 'false'
        run: |
          {
            echo "# Patched APKs (Daily Build)"
            echo
            echo "Built on: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            echo "Configured targets: ${{ needs.prepare-matrix.outputs.matrix_count }}"
            echo "Built APK files: ${{ steps.prepare.outputs.apk_count }}"
            echo
            echo "## Files"
            find ./release-apks -maxdepth 1 -type f -name "*.apk" -printf "- %f\n" | sort
          } > release_notes.md

      - name: Check Existing latest Release
        if: steps.prepare.outputs.skip_release == 'false'
        id: check_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view latest >/dev/null 2>&1; then
            echo "release_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update existing latest Release
        if: steps.prepare.outputs.skip_release == 'false' && steps.check_release.outputs.release_exists == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload latest ./release-apks/*.apk --clobber
          gh release edit latest \
            --title "Patched APKs - $(date -u +'%Y-%m-%d %H:%M UTC')" \
            --notes-file release_notes.md

      - name: Create latest Release
        if: steps.prepare.outputs.skip_release == 'false' && steps.check_release.outputs.release_exists == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest ./release-apks/*.apk \
            --title "Patched APKs - $(date -u +'%Y-%m-%d %H:%M UTC')" \
            --notes-file release_notes.md \
            --latest

      - name: Print Release URL
        if: steps.prepare.outputs.skip_release == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view latest --json url --jq '.url'
